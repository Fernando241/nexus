services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: nexus_app

    working_dir: /var/www

    volumes:
      - ./:/var/www

    ports:
      - "8000:8000"

    command: php artisan serve --host=0.0.0.0 --port=8000

    tty: true

  mysql:
    image: mysql:8.4
    container_name: nexus_mysql

    environment:
      MYSQL_DATABASE: nexus
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: nexus

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: nexus_redis

    ports:
      - "6379:6379"

volumes:
  mysql_data:
